name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Left metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: KevinHuge
          filename: github-metrics.svg

          template: classic
          config_timezone: Asia/Tokyo

          base: ""
          plugin_followup: yes
          plugin_followup_sections: user, repositories
          plugin_followup_indepth: yes

          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes

          plugin_starlists: yes
          plugin_starlists_limit: 1
          plugin_starlists_limit_repositories: 6
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 6

          plugin_rss: yes
          plugin_rss_source: https://rsshub.app/github/repo/KevinHuge/KevinHuge/commits/master
          plugin_rss_limit: 3

      - name: Right metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: KevinHuge
          filename: github-metrics-right.svg

          template: classic
          config_timezone: Asia/Tokyo

          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed
          plugin_achievements_limit: 8
